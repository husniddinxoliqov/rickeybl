version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rickeybl
      POSTGRES_USER: rickeybl
      POSTGRES_PASSWORD: rickeybl_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://rickeybl:rickeybl_dev@postgres:5432/rickeybl?schema=public
      JWT_SECRET: change_this_secret
      BOT_TOKEN: your_bot_token
      ROOT_USERNAME: admin
      ROOT_PASSWORD: change_this_password
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres_data:
