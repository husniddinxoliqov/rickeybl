services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rickeybl
      POSTGRES_USER: rickeybl
      POSTGRES_PASSWORD: rickeybl_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://rickeybl:rickeybl_dev@postgres:5432/rickeybl?schema=public
      JWT_SECRET: dev_only_jwt_secret_please_change_0123456789
      BOT_TOKEN: 0000000000:dev_only_bot_token_placeholder
      ROOT_USERNAME: admin
      ROOT_EMAIL: admin@example.local
      ROOT_PASSWORD: change_this_password
      NODE_ENV: development
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    # node:20-alpine includes BusyBox, so /bin/busybox wget is available here.
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    environment:
      BACKEND_UPSTREAM: backend:3000
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    # nginx:alpine includes BusyBox, so /bin/busybox wget is available here.
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
